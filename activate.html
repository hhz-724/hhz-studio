<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>激活 - hhz studio</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.modal-overlay { display:none; }
.modal-overlay.show { display:flex; }
.step-num {
  display:inline-block; width:22px; height:22px; line-height:22px; border-radius:50%;
  background:var(--text-muted); color:#fff; font-size:11px; text-align:center; margin-right:6px;
}
.step.active .step-num { background:var(--primary); }
.form-error { font-size:12px; color:var(--error); margin-top:4px; display:none; }
.result-area { display:none; }
.result-area.show { display:block; }
.result-card { border-radius:16px; padding:24px; text-align:center; border:1px solid var(--border-card); }
.result-card.success { background:rgba(16,185,129,0.06); border-color:rgba(16,185,129,0.2); }
.result-card.error { background:rgba(239,68,68,0.06); border-color:rgba(239,68,68,0.2); }
.result-key {
  display:inline-block; margin-top:16px; padding:16px 24px;
  border:1px solid var(--border-default); border-radius:12px;
  font-family:"SF Mono","Fira Code",monospace; font-size:32px; font-weight:700;
  letter-spacing:0.1em; color:var(--text-primary); background:var(--bg-page);
}
.modal-code {
  padding:14px; border:1px solid var(--border-default); border-radius:10px;
  font-family:"SF Mono","Fira Code",monospace; font-size:20px; font-weight:700;
  letter-spacing:0.06em; text-align:center; word-break:break-all; margin-bottom:20px;
}
.modal-dialog h2 { font-size:20px; font-weight:700; margin-bottom:12px; }
.modal-dialog p { font-size:14px; color:var(--text-secondary); line-height:1.6; margin-bottom:16px; }
</style>
</head>
<body>
<div class="container">
  <header class="site-header">
    <a class="logo" href="index.html">hhz studio</a>
    <nav class="nav">
      <a href="shifz.html">拾分钟</a>
      <button class="theme-btn" id="theme-toggle" aria-label="切换主题">🌙</button>
    </nav>
  </header>

  <main class="page-section">
    <a class="page-back" href="index.html">← 返回</a>
    <h1 class="page-title">获取激活码</h1>

    <div class="steps">
      <div class="step active"><span class="step-num">1</span>扫码支付</div>
      <div class="step"><span class="step-num">2</span>填写信息</div>
      <div class="step"><span class="step-num">3</span>获取激活码</div>
    </div>

    <div class="pay-section">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:12px;align-self:flex-start;">选择支付方式</h3>
      <div class="qr-area" style="flex-direction:row;align-items:flex-start;width:100;">
        <img class="qr-img" src="assets/wechat-qr.png" alt="微信收款码" onclick="document.getElementById('qr-modal').classList.add('show')" style="width:140px;height:140px;border-radius:8px;cursor:pointer;border:1px solid var(--border-default);">
        <div style="flex:1;font-size:13px;color:var(--text-secondary);line-height:1.6;">
          <strong style="color:var(--text-primary);">微信支付</strong><br>
          扫描二维码付款后，将微信支付「交易单号」填入下方表单。
        </div>
      </div>
    </div>

    <div class="form-section" style="margin-top:20px;">
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label" for="device-code" style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-secondary);">设备码</label>
        <input class="form-input" id="device-code" type="text" autocomplete="off" placeholder="请确保与手表端显示一致" style="width:100%;height:48px;padding:0 14px;border-radius:10px;border:1px solid var(--border-default);background:var(--bg-page);color:var(--text-primary);font-size:15px;outline:none;">
        <div class="form-hint" style="font-size:12px;color:var(--text-muted);margin-top:4px;">在手表「激活」页面可查看设备码</div>
        <div class="form-error" id="device-error">请输入设备码</div>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label" for="order-no" style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-secondary);">订单号</label>
        <input class="form-input" id="order-no" type="text" autocomplete="off" placeholder="微信支付交易单号" style="width:100%;height:48px;padding:0 14px;border-radius:10px;border:1px solid var(--border-default);background:var(--bg-page);color:var(--text-primary);font-size:15px;outline:none;">
        <div class="form-hint" style="font-size:12px;color:var(--text-muted);margin-top:4px;">付款后可在微信账单中查看</div>
        <div class="form-error" id="order-error">请输入订单号</div>
      </div>
      <button class="submit-btn" id="submit-btn" type="button" onclick="showConfirmModal()" style="width:100%;height:50px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:16px;border:none;cursor:pointer;">获取激活码</button>
    </div>

    <div class="result-area" id="result-area">
      <div class="result-card" id="result-card">
        <div id="result-message"></div>
        <div class="result-key" id="result-key" style="display:none;"></div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-dialog slide-up" style="background:var(--bg-card);border-radius:16px;max-width:400px;width:100%;padding:24px;">
      <h2>确认设备码</h2>
      <p>请确保下方设备码与手表应用显示完全一致。</p>
      <div class="modal-code" id="confirm-code"></div>
      <div class="modal-actions" style="display:flex;gap:10px;">
        <button class="modal-btn secondary" onclick="closeConfirmModal()" style="flex:1;height:46px;border-radius:10px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;">返回修改</button>
        <button class="modal-btn primary" id="confirm-ok" onclick="doActivate()" style="flex:1;height:46px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;">确认无误</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <span>&copy; 2026 hhz studio</span>
  </footer>

</div>

<script>
(function() {
  // 激活码生成算法（与手表端一致）
  function djb2(str) {
    var h = 5381
    for (var i = 0; i < str.length; i++) { h = ((h << 5) + h) + str.charCodeAt(i); h = h & 0x7FFFFFFF }
    return h
  }
  function generateKey(deviceCode) {
    var SALT = 'GuGUc_gSR?J_Bj?oBc?fRS?_ExCRD'
    var hash = djb2(deviceCode + SALT).toString(16)
    var expected = ''
    for (var i = 0; i < 5; i++) {
      var n = parseInt(hash[i % hash.length], 16)
      if (isNaN(n)) n = 0
      expected += (n % 10).toString()
    }
    var w = [1, 3, 7, 9, 5], sum = 0
    for (var i = 0; i < 5; i++) sum += parseInt(expected[i]) * w[i]
    expected += (sum % 10).toString()
    return expected
  }

  window.showConfirmModal = function() {
    var deviceCode = document.getElementById('device-code').value.trim()
    var orderNo = document.getElementById('order-no').value.trim()
    var hasError = false

    if (!deviceCode) {
      document.getElementById('device-code').style.borderColor = 'var(--error)'
      document.getElementById('device-error').style.display = 'block'
      hasError = true
    } else {
      document.getElementById('device-code').style.borderColor = ''
      document.getElementById('device-error').style.display = 'none'
    }
    if (!orderNo) {
      document.getElementById('order-no').style.borderColor = 'var(--error)'
      document.getElementById('order-error').style.display = 'block'
      hasError = true
    } else {
      document.getElementById('order-no').style.borderColor = ''
      document.getElementById('order-error').style.display = 'none'
    }
    if (hasError) return

    document.getElementById('confirm-code').textContent = deviceCode
    document.getElementById('confirm-modal').classList.add('show')
    document.getElementById('confirm-ok').disabled = false
    document.getElementById('confirm-ok').textContent = '确认无误'
  }

  window.closeConfirmModal = function() {
    document.getElementById('confirm-modal').classList.remove('show')
  }

  window.doActivate = function() {
    var btn = document.getElementById('confirm-ok')
    btn.disabled = true
    btn.textContent = '计算中...'

    var deviceCode = document.getElementById('device-code').value.trim()

    closeConfirmModal()
    document.getElementById('submit-btn').disabled = true
    document.getElementById('submit-btn').textContent = '计算中...'

    // 本地计算激活码（算法与手表端一致）
    var finalKey = generateKey(deviceCode)

    var area = document.getElementById('result-area')
    var card = document.getElementById('result-card')
    var msg = document.getElementById('result-message')
    var keyEl = document.getElementById('result-key')

    area.classList.add('show')
    card.className = 'result-card success'
    msg.innerHTML = '<p style="font-weight:600;">激活成功！请在手表端输入以下激活码：</p>'
    keyEl.textContent = finalKey
    keyEl.style.display = 'inline-block'

    document.getElementById('submit-btn').disabled = false
    document.getElementById('submit-btn').textContent = '获取激活码'
  }

  document.getElementById('confirm-modal').addEventListener('click', function(e) {
    if (e.target === this) closeConfirmModal()
  })
})()
</script>
<script src="assets/script.js"></script>
</body>
</html>
